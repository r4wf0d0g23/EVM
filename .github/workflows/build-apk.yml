name: Build Debug APK

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'EVE-Vault-debug.apk'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install && npm install -D typescript

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Stub web dist for cap sync
        run: |
          mkdir -p ../evevault/apps/web/dist
          cp -r android/app/src/main/assets/public/. ../evevault/apps/web/dist/

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk EVE-Vault-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EVE-Vault-debug
          path: EVE-Vault-debug.apk
          retention-days: 30

      - name: Create GitHub Release (on release publish)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: EVE-Vault-debug.apk
          name: EVE Vault Mobile ${{ github.ref_name }}
          body: |
            EVE Vault Mobile ${{ github.ref_name }}

            Debug APK — sideload via Android Settings > Install unknown apps.

            Changes: see commit history.

      - name: Commit APK to repo (on branch push)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "Reality Anchor"
          git config user.email "reality.anchor.raw@gmail.com"
          git add EVE-Vault-debug.apk
          git diff --cached --quiet || git commit -m "build: update debug APK [skip ci]"
          git push
