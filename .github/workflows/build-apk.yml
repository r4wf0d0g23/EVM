name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk EVE-Vault-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EVE-Vault-debug
          path: EVE-Vault-debug.apk
          retention-days: 30

      - name: Commit APK to repo
        run: |
          git config user.name "Reality Anchor"
          git config user.email "reality.anchor.raw@gmail.com"
          git add EVE-Vault-debug.apk
          git diff --cached --quiet || git commit -m "build: update debug APK [skip ci]"
          git push
