name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Generate capacitor-cordova-android-plugins
        run: |
          mkdir -p android/capacitor-cordova-android-plugins/src/main
          cat > android/capacitor-cordova-android-plugins/build.gradle << 'EOF'
          apply plugin: 'com.android.library'
          android {
            namespace "capacitor.cordova.android.plugins"
            compileSdkVersion rootProject.ext.compileSdkVersion
            defaultConfig { minSdkVersion rootProject.ext.minSdkVersion }
          }
          dependencies {}
          EOF
          cat > android/capacitor-cordova-android-plugins/cordova.variables.gradle << 'EOF'
          ext {}
          EOF

      - name: Generate capacitor config files
        run: |
          node -e "
          const fs = require('fs');
          fs.writeFileSync('android/app/src/main/assets/capacitor.config.json', JSON.stringify({appId:'com.evefrontier.vault',appName:'EVE Vault',bundledWebRuntime:false}));
          fs.writeFileSync('android/app/src/main/assets/capacitor.plugins.json', '[]');
          fs.writeFileSync('android/app/src/main/res/xml/config.xml', '<?xml version=\"1.0\" encoding=\"utf-8\"?><widget version=\"1.0.0\" xmlns=\"http://www.w3.org/ns/widgets\" xmlns:cdv=\"http://cordova.apache.org/ns/1.0\"></widget>');
          "

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk EVE-Vault-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EVE-Vault-debug
          path: EVE-Vault-debug.apk
          retention-days: 30

      - name: Commit APK to repo
        run: |
          git config user.name "Reality Anchor"
          git config user.email "reality.anchor.raw@gmail.com"
          git add EVE-Vault-debug.apk
          git diff --cached --quiet || git commit -m "build: update debug APK [skip ci]"
          git push
